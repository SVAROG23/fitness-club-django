{% extends 'base.html' %}

{% block title %}Расписание - Fitness Club{% endblock %}

{% block content %}
<div class="card">
    <h1 class="card-title">📅 Расписание тренировок</h1>
</div>

<div class="card">
    <div id="calendar-view"></div>
</div>

<script>
    api.getBookings().then(bookings => {
        const container = document.getElementById('calendar-view');
        if (bookings.length === 0) {
            container.innerHTML = '<p>Нет записей</p>';
            return;
        }
        container.innerHTML = bookings.map(b => `
            <div style="border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:8px;">
                <strong>${b.client_name}</strong> - ${b.trainer_name}<br>
                Дата: ${formatDate(b.start_time)}<br>
                Статус: ${b.status}
            </div>
        `).join('');
    });
</script>
{% endblock %}
