{% extends 'base.html' %}

{% block title %}Клиенты - Fitness Club{% endblock %}

{% block content %}
<div class="card">
    <h1 class="card-title">👥 Список клиентов</h1>
</div>

<div class="card">
    <table>
        <thead>
            <tr><th>ID</th><th>Имя</th><th>Телефон</th><th>Тренер</th></tr>
        </thead>
        <tbody id="clients-list"></tbody>
    </table>
</div>

<script>
    api.getClients().then(clients => {
        const tbody = document.getElementById('clients-list');
        clients.forEach(client => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = client.id;
            row.insertCell(1).textContent = client.user?.first_name + ' ' + client.user?.last_name;
            row.insertCell(2).textContent = client.user?.phone || '-';
            row.insertCell(3).textContent = client.trainer_name || '-';
        });
    });
</script>
{% endblock %}
