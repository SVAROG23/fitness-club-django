{% extends 'base.html' %}

{% block title %}Карточка клиента - Fitness Club{% endblock %}

{% block content %}
<div class="card">
    <h1 class="card-title">👤 Карточка клиента</h1>
    <div id="client-info"></div>
</div>

<script>
    const clientId = window.location.pathname.split('/').pop();
    api.getClientProfile(clientId).then(client => {
        const info = document.getElementById('client-info');
        info.innerHTML = `
            <p><strong>ФИО:</strong> ${client.user?.first_name} ${client.user?.last_name}</p>
            <p><strong>Тренер:</strong> ${client.trainer_name || 'Не назначен'}</p>
            <p><strong>Цели:</strong> ${client.goals || '-'}</p>
            <p><strong>Мед. ограничения:</strong> ${client.medical_restrictions || '-'}</p>
        `;
    });
</script>
{% endblock %}
