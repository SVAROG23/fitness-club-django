{% extends 'base.html' %}

{% block title %}Программа тренировок - Fitness Club{% endblock %}

{% block content %}
<div class="card">
    <div id="program-info"></div>
</div>

<script>
    const programId = window.location.pathname.split('/').pop();
    api.request(`/workouts/programs/${programId}/`).then(program => {
        const infoDiv = document.getElementById('program-info');
        infoDiv.innerHTML = `
            <h1>${program.name}</h1>
            <p>${program.description || ''}</p>
            <p><strong>Клиент:</strong> ${program.client_name}</p>
            <p><strong>Автор:</strong> ${program.author_name}</p>
        `;
    });
</script>
{% endblock %}
